<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cost Analyzer Helpdesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.02em;
    }

    header p {
      margin-top: 0.4rem;
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .card {
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 1.75rem;
      width: 100%;
      max-width: 560px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    input[type="text"] {
      flex: 1;
      background: #0f1117;
      border: 1px solid #3a4560;
      border-radius: 8px;
      padding: 0.6rem 0.85rem;
      font-size: 0.95rem;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: #6366f1;
    }

    input[type="text"]::placeholder {
      color: #4a5568;
    }

    button.estimate-btn {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.2rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button.estimate-btn:hover:not(:disabled) {
      background: #4f46e5;
    }

    button.estimate-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-top: 0.85rem;
    }

    .chip {
      background: #252d3d;
      border: 1px solid #3a4560;
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
      font-size: 0.82rem;
      color: #a5b4fc;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      user-select: none;
    }

    .chip:hover {
      background: #2e3a52;
      border-color: #6366f1;
    }

    .divider {
      border: none;
      border-top: 1px solid #2d3748;
      margin: 1.4rem 0;
    }

    .result-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    pre#result {
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.82rem;
      line-height: 1.55;
      color: #a5f3fc;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 3.5rem;
    }

    pre#result.error {
      color: #f87171;
      border-color: #7f1d1d;
    }

    pre#result.idle {
      color: #334155;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #334155;
    }
  </style>
</head>
<body>

<header>
  <h1>Cost Analyzer Helpdesk</h1>
  <p>Enter an EC2 instance type to get a monthly cost estimate.</p>
</header>

<div class="card">
  <label for="instance_type">instance type, e.g. m5.large</label>
  <div class="input-row">
    <input
      type="text"
      id="instance_type"
      name="instance_type"
      placeholder="instance type, e.g. m5.large"
      autocomplete="off"
      spellcheck="false"
    />
    <button class="estimate-btn" id="estimateBtn" onclick="runEstimate()">Estimate</button>
  </div>

  <div class="chips">
    <span class="chip" onclick="prefill('m5.large')">m5.large</span>
    <span class="chip" onclick="prefill('t3.micro')">t3.micro</span>
    <span class="chip" onclick="prefill('r5.xlarge')">r5.xlarge</span>
  </div>

  <hr class="divider" />

  <div class="result-label">Result</div>
  <pre id="result" class="idle">— waiting for input —</pre>
</div>

<footer>Powered by MCP &bull; no pricing logic runs in this page</footer>

<script>
  const MCP_ENDPOINT = "http://127.0.0.1:38475";

  function prefill(value) {
    document.getElementById("instance_type").value = value;
    document.getElementById("instance_type").focus();
  }

  async function runEstimate() {
    const inputEl = document.getElementById("instance_type");
    const btn     = document.getElementById("estimateBtn");
    const pre     = document.getElementById("result");
    const value   = inputEl.value.trim();

    if (!value) {
      pre.className = "error";
      pre.textContent = "Please enter an instance type first.";
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Estimating…';
    pre.className = "";
    pre.textContent = "Calling MCP endpoint…";

    const requestBody = {
      jsonrpc: "2.0",
      id: Date.now(),
      method: "tools/call",
      params: {
        name: "estimate_ec2_monthly_cost",
        arguments: {
          instance_type: value
        }
      }
    };

    try {
      const response = await fetch(MCP_ENDPOINT, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(requestBody)
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }

      const data = await response.json();

      if (data.error) {
        pre.className = "error";
        pre.textContent = "JSON-RPC error:\n" + JSON.stringify(data.error, null, 2);
      } else {
        pre.className = "";
        pre.textContent = JSON.stringify(data.result, null, 2);
      }
    } catch (err) {
      pre.className = "error";
      pre.textContent = "Request failed:\n" + err.message;
    } finally {
      btn.disabled = false;
      btn.innerHTML = "Estimate";
    }
  }

  document.getElementById("instance_type").addEventListener("keydown", function(e) {
    if (e.key === "Enter") runEstimate();
  });
</script>

</body>
</html>
