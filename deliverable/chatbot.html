<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cost Analyzer Helpdesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #a78bfa;
      margin-bottom: 1.5rem;
      text-align: center;
      letter-spacing: -0.02em;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    input[type="text"] {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 1rem;
      padding: 0.6rem 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #7c3aed;
    }

    button.estimate-btn {
      background: #7c3aed;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.6rem 1.2rem;
      transition: background 0.2s;
      white-space: nowrap;
    }

    button.estimate-btn:hover { background: #6d28d9; }
    button.estimate-btn:disabled { background: #4b3a7a; cursor: not-allowed; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
    }

    .chip {
      background: #252840;
      border: 1px solid #3b3f6b;
      border-radius: 20px;
      color: #c4b5fd;
      cursor: pointer;
      font-size: 0.82rem;
      padding: 0.25rem 0.75rem;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }

    .chip:hover {
      background: #312e6e;
      border-color: #7c3aed;
    }

    .result-label {
      font-size: 0.78rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }

    pre#result {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #a3e635;
      font-size: 0.88rem;
      line-height: 1.55;
      min-height: 80px;
      overflow-x: auto;
      padding: 1rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    pre#result.error { color: #f87171; }
    pre#result.loading { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Cost Analyzer Helpdesk</h1>

    <div class="input-row">
      <input
        type="text"
        id="instance_type"
        placeholder="instance type, e.g. m5.large"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="estimate-btn" id="estimateBtn" onclick="runEstimate()">Estimate</button>
    </div>

    <div class="chips">
      <span class="chip" onclick="prefill('m5.large')">m5.large</span>
      <span class="chip" onclick="prefill('t3.micro')">t3.micro</span>
      <span class="chip" onclick="prefill('r5.xlarge')">r5.xlarge</span>
    </div>

    <div class="result-label">Result</div>
    <pre id="result">Enter an instance type and click Estimate.</pre>
  </div>

  <script>
    const ENDPOINT = "http://127.0.0.1:47279";

    function prefill(value) {
      document.getElementById("instance_type").value = value;
      document.getElementById("instance_type").focus();
    }

    async function runEstimate() {
      const instanceType = document.getElementById("instance_type").value.trim();
      const resultEl = document.getElementById("result");
      const btn = document.getElementById("estimateBtn");

      if (!instanceType) {
        resultEl.className = "error";
        resultEl.textContent = "Please enter an instance type.";
        return;
      }

      btn.disabled = true;
      resultEl.className = "loading";
      resultEl.textContent = "Calling MCP endpoint...";

      const requestBody = {
        jsonrpc: "2.0",
        id: Date.now(),
        method: "tools/call",
        params: {
          name: "estimate_ec2_monthly_cost",
          arguments: {
            instance_type: instanceType
          }
        }
      };

      try {
        const response = await fetch(ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(requestBody)
        });

        const data = await response.json();

        if (data.error) {
          resultEl.className = "error";
          resultEl.textContent = "Error " + data.error.code + ": " + data.error.message;
        } else {
          resultEl.className = "";
          resultEl.textContent = JSON.stringify(data.result, null, 2);
        }
      } catch (err) {
        resultEl.className = "error";
        resultEl.textContent = "Network error: " + err.message;
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById("instance_type").addEventListener("keydown", function (e) {
      if (e.key === "Enter") runEstimate();
    });
  </script>
</body>
</html>
