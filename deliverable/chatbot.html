<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cost Analyzer Helpdesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 1.55rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.35rem;
    }

    .subtitle {
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 1.6rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.4rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.55rem 0.9rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      color: #111827;
    }

    input[type="text"]:focus {
      border-color: #4f46e5;
    }

    button.estimate-btn {
      padding: 0.55rem 1.25rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button.estimate-btn:hover { background: #4338ca; }
    button.estimate-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-bottom: 1.4rem;
    }

    .chip {
      padding: 0.3rem 0.75rem;
      background: #ede9fe;
      color: #4f46e5;
      border: 1.5px solid #c4b5fd;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      user-select: none;
    }

    .chip:hover {
      background: #ddd6fe;
      border-color: #a78bfa;
    }

    .result-area {
      margin-top: 1.2rem;
    }

    .result-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }

    pre#result {
      background: #1e1e2e;
      color: #cdd6f4;
      border-radius: 8px;
      padding: 1rem 1.1rem;
      font-size: 0.84rem;
      line-height: 1.6;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 3.5rem;
    }

    pre#result.error { color: #f38ba8; }
    pre#result.loading { color: #89b4fa; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #a5b4fc;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Cost Analyzer Helpdesk</h1>
    <p class="subtitle">Enter an EC2 instance type to get a monthly cost estimate from the pricing server.</p>

    <label for="instance_type">instance type, e.g. m5.large</label>
    <div class="input-row">
      <input
        type="text"
        id="instance_type"
        placeholder="instance type, e.g. m5.large"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="estimate-btn" id="estimateBtn" onclick="runEstimate()">Estimate</button>
    </div>

    <div class="chips">
      <span class="chip" onclick="prefill('m5.large')">m5.large</span>
      <span class="chip" onclick="prefill('t3.micro')">t3.micro</span>
      <span class="chip" onclick="prefill('r5.xlarge')">r5.xlarge</span>
    </div>

    <div class="result-area">
      <div class="result-label">Result</div>
      <pre id="result">Awaiting estimate&hellip;</pre>
    </div>
  </div>

  <script>
    const ENDPOINT = "http://127.0.0.1:49813";
    let reqId = 1;

    function prefill(value) {
      document.getElementById("instance_type").value = value;
      document.getElementById("instance_type").focus();
    }

    async function runEstimate() {
      const inputEl = document.getElementById("instance_type");
      const btn = document.getElementById("estimateBtn");
      const resultEl = document.getElementById("result");
      const instanceType = inputEl.value.trim();

      if (!instanceType) {
        resultEl.className = "error";
        resultEl.textContent = "Please enter an instance type.";
        return;
      }

      btn.disabled = true;
      resultEl.className = "loading";
      resultEl.innerHTML = '<span class="spinner"></span>Calling pricing server\u2026';

      const payload = {
        jsonrpc: "2.0",
        id: reqId++,
        method: "tools/call",
        params: {
          name: "estimate_ec2_monthly_cost",
          arguments: {
            instance_type: instanceType
          }
        }
      };

      try {
        const response = await fetch(ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();

        if (data.error) {
          resultEl.className = "error";
          resultEl.textContent = JSON.stringify(data.error, null, 2);
        } else {
          resultEl.className = "";
          resultEl.textContent = JSON.stringify(data.result, null, 2);
        }
      } catch (err) {
        resultEl.className = "error";
        resultEl.textContent = "Error: " + err.message;
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById("instance_type").addEventListener("keydown", function(e) {
      if (e.key === "Enter") runEstimate();
    });
  </script>
</body>
</html>
