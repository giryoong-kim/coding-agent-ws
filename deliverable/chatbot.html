<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cost Analyzer Helpdesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.4rem;
    }

    .input-row {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.6rem 0.85rem;
      border: 1.5px solid #d0d5dd;
      border-radius: 8px;
      font-size: 1rem;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: #4f6ef7;
    }

    button.estimate-btn {
      padding: 0.6rem 1.2rem;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button.estimate-btn:hover {
      background: #3a57e8;
    }

    button.estimate-btn:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-bottom: 1.5rem;
    }

    .chip {
      padding: 0.3rem 0.8rem;
      background: #eef0fd;
      color: #4f6ef7;
      border: 1.5px solid #c5ccf8;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }

    .chip:hover {
      background: #4f6ef7;
      color: #fff;
      border-color: #4f6ef7;
    }

    .result-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.4rem;
    }

    pre#result {
      background: #f7f8fa;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.88rem;
      color: #1a1a2e;
      min-height: 80px;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
    }

    pre#result.error {
      color: #c0392b;
      background: #fff5f5;
      border-color: #f5c6c6;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2.5px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Cost Analyzer Helpdesk</h1>

    <label for="instance-input">instance type, e.g. m5.large</label>
    <div class="input-row">
      <input
        type="text"
        id="instance-input"
        placeholder="instance type, e.g. m5.large"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="estimate-btn" id="estimate-btn" onclick="runEstimate()">Estimate</button>
    </div>

    <div class="chips">
      <span class="chip" onclick="prefill('m5.large')">m5.large</span>
      <span class="chip" onclick="prefill('t3.micro')">t3.micro</span>
      <span class="chip" onclick="prefill('r5.xlarge')">r5.xlarge</span>
    </div>

    <div class="result-label">Result</div>
    <pre id="result">Results will appear here after you click Estimate.</pre>
  </div>

  <script>
    const MCP_ENDPOINT = "http://127.0.0.1:46485";

    function prefill(value) {
      document.getElementById("instance-input").value = value;
      document.getElementById("instance-input").focus();
    }

    async function runEstimate() {
      const inputEl = document.getElementById("instance-input");
      const resultEl = document.getElementById("result");
      const btn = document.getElementById("estimate-btn");

      const instanceType = inputEl.value.trim();
      if (!instanceType) {
        resultEl.className = "error";
        resultEl.textContent = "Please enter an instance type before estimating.";
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Loading…';
      resultEl.className = "";
      resultEl.textContent = "Calling MCP endpoint…";

      const requestBody = {
        jsonrpc: "2.0",
        id: Date.now(),
        method: "tools/call",
        params: {
          name: "estimate_ec2_monthly_cost",
          arguments: {
            instance_type: instanceType
          }
        }
      };

      try {
        const response = await fetch(MCP_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(requestBody)
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status} ${response.statusText}`);
        }

        const data = await response.json();

        if (data.error) {
          resultEl.className = "error";
          resultEl.textContent = "JSON-RPC error:\n" + JSON.stringify(data.error, null, 2);
        } else {
          resultEl.className = "";
          resultEl.textContent = JSON.stringify(data.result, null, 2);
        }
      } catch (err) {
        resultEl.className = "error";
        resultEl.textContent = "Request failed:\n" + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = "Estimate";
      }
    }

    document.getElementById("instance-input").addEventListener("keydown", function (e) {
      if (e.key === "Enter") runEstimate();
    });
  </script>
</body>
</html>
