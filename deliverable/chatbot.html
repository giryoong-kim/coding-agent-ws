<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cost Analyzer Helpdesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      max-width: 560px;
      width: 100%;
      padding: 2rem 2rem 1.75rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 0.4rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.55rem 0.85rem;
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      font-size: 1rem;
      color: #1a202c;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: #4299e1;
    }

    button.estimate-btn {
      padding: 0.55rem 1.2rem;
      background: #4299e1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button.estimate-btn:hover {
      background: #2b6cb0;
    }

    button.estimate-btn:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
    }

    .chip {
      padding: 0.3rem 0.75rem;
      background: #ebf8ff;
      color: #2b6cb0;
      border: 1.5px solid #bee3f8;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }

    .chip:hover {
      background: #bee3f8;
      border-color: #90cdf4;
    }

    .result-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 0.4rem;
    }

    pre#result {
      background: #1a202c;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.85rem;
      line-height: 1.6;
      min-height: 3.5rem;
      max-height: 320px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status {
      font-size: 0.8rem;
      color: #718096;
      margin-top: 0.6rem;
      min-height: 1.1em;
    }

    .error-text { color: #fc8181; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Cost Analyzer Helpdesk</h1>

    <label for="instance_type">instance type, e.g. m5.large</label>
    <div class="input-row">
      <input type="text" id="instance_type" placeholder="instance type, e.g. m5.large" autocomplete="off" />
      <button class="estimate-btn" id="estimateBtn" onclick="runEstimate()">Estimate</button>
    </div>

    <div class="chips">
      <span class="chip" onclick="prefill('m5.large')">m5.large</span>
      <span class="chip" onclick="prefill('t3.micro')">t3.micro</span>
      <span class="chip" onclick="prefill('r5.xlarge')">r5.xlarge</span>
    </div>

    <div class="result-label">Result</div>
    <pre id="result">Results will appear here...</pre>
    <div class="status" id="status"></div>
  </div>

  <script>
    const MCP_ENDPOINT = "http://127.0.0.1:40469";

    function prefill(value) {
      document.getElementById("instance_type").value = value;
      document.getElementById("instance_type").focus();
    }

    async function runEstimate() {
      const inputEl = document.getElementById("instance_type");
      const resultEl = document.getElementById("result");
      const statusEl = document.getElementById("status");
      const btn = document.getElementById("estimateBtn");

      const instanceType = inputEl.value.trim();
      if (!instanceType) {
        statusEl.textContent = "Please enter an instance type.";
        statusEl.className = "status error-text";
        return;
      }

      btn.disabled = true;
      statusEl.className = "status";
      statusEl.textContent = "Calling MCP endpoint...";
      resultEl.textContent = "";

      const requestBody = {
        jsonrpc: "2.0",
        id: Date.now(),
        method: "tools/call",
        params: {
          name: "estimate_ec2_monthly_cost",
          arguments: {
            instance_type: instanceType
          }
        }
      };

      try {
        const response = await fetch(MCP_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(requestBody)
        });

        const data = await response.json();

        if (data.error) {
          resultEl.textContent = JSON.stringify(data.error, null, 2);
          statusEl.textContent = "MCP returned an error.";
          statusEl.className = "status error-text";
        } else {
          resultEl.textContent = JSON.stringify(data.result, null, 2);
          statusEl.textContent = "Done.";
          statusEl.className = "status";
        }
      } catch (err) {
        resultEl.textContent = String(err);
        statusEl.textContent = "Request failed.";
        statusEl.className = "status error-text";
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById("instance_type").addEventListener("keydown", function(e) {
      if (e.key === "Enter") runEstimate();
    });
  </script>
</body>
</html>
