<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cost Analyzer Helpdesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.02em;
    }

    header p {
      margin-top: 0.4rem;
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .card {
      background: #1e2330;
      border: 1px solid #2d3448;
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 560px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    input[type="text"] {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3448;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 0.55rem 0.8rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: #6366f1;
    }

    button.estimate-btn {
      background: #6366f1;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.55rem 1.1rem;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button.estimate-btn:hover { background: #4f46e5; }
    button.estimate-btn:disabled { background: #3730a3; cursor: not-allowed; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.9rem;
    }

    .chip {
      background: #2d3448;
      border: 1px solid #3d4663;
      border-radius: 20px;
      color: #a5b4fc;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.3rem 0.75rem;
      transition: background 0.15s, border-color 0.15s;
    }

    .chip:hover {
      background: #3d4663;
      border-color: #6366f1;
      color: #c7d2fe;
    }

    .result-section {
      margin-top: 1.25rem;
    }

    .result-section h2 {
      font-size: 0.8rem;
      font-weight: 600;
      color: #64748b;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    pre {
      background: #0a0d14;
      border: 1px solid #2d3448;
      border-radius: 8px;
      color: #86efac;
      font-family: "Fira Mono", "Consolas", monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      overflow-x: auto;
      padding: 1rem;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 3rem;
    }

    pre.error { color: #f87171; }
    pre.loading { color: #94a3b8; font-style: italic; }
  </style>
</head>
<body>

  <header>
    <h1>Cost Analyzer Helpdesk</h1>
    <p>Enter an EC2 instance type to get a monthly cost estimate.</p>
  </header>

  <div class="card">
    <label for="instance-input">instance type, e.g. m5.large</label>
    <div class="input-row">
      <input
        type="text"
        id="instance-input"
        placeholder="instance type, e.g. m5.large"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="estimate-btn" id="estimate-btn" onclick="runEstimate()">Estimate</button>
    </div>

    <div class="chips">
      <span class="chip" onclick="prefill('m5.large')">m5.large</span>
      <span class="chip" onclick="prefill('t3.micro')">t3.micro</span>
      <span class="chip" onclick="prefill('r5.xlarge')">r5.xlarge</span>
    </div>

    <div class="result-section">
      <h2>Result</h2>
      <pre id="result-box">Results will appear here.</pre>
    </div>
  </div>

  <script>
    const MCP_ENDPOINT = "http://127.0.0.1:57965";

    function prefill(value) {
      document.getElementById("instance-input").value = value;
      document.getElementById("instance-input").focus();
    }

    async function runEstimate() {
      const inputEl = document.getElementById("instance-input");
      const resultBox = document.getElementById("result-box");
      const btn = document.getElementById("estimate-btn");

      const instanceType = inputEl.value.trim();
      if (!instanceType) {
        resultBox.className = "error";
        resultBox.textContent = "Please enter an instance type before clicking Estimate.";
        return;
      }

      btn.disabled = true;
      resultBox.className = "loading";
      resultBox.textContent = "Calling MCP endpoint...";

      const requestBody = {
        jsonrpc: "2.0",
        id: Date.now(),
        method: "tools/call",
        params: {
          name: "estimate_ec2_monthly_cost",
          arguments: {
            instance_type: instanceType
          }
        }
      };

      try {
        const response = await fetch(MCP_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(requestBody)
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();

        if (data.error) {
          resultBox.className = "error";
          resultBox.textContent = JSON.stringify(data.error, null, 2);
        } else {
          resultBox.className = "";
          resultBox.textContent = JSON.stringify(data.result, null, 2);
        }
      } catch (err) {
        resultBox.className = "error";
        resultBox.textContent = "Error: " + err.message;
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById("instance-input").addEventListener("keydown", function (e) {
      if (e.key === "Enter") runEstimate();
    });
  </script>

</body>
</html>
