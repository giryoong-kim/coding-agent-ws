<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cost Analyzer Helpdesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #2d3748;
    }

    header p {
      margin-top: 0.4rem;
      color: #718096;
      font-size: 0.95rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 2rem;
      width: 100%;
      max-width: 600px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.4rem;
      font-size: 0.9rem;
      color: #4a5568;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.6rem 0.9rem;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #4299e1;
    }

    button.estimate-btn {
      padding: 0.6rem 1.2rem;
      background: #4299e1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    button.estimate-btn:hover { background: #3182ce; }
    button.estimate-btn:disabled { background: #a0aec0; cursor: not-allowed; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .chip {
      padding: 0.3rem 0.8rem;
      background: #ebf8ff;
      color: #2b6cb0;
      border: 1px solid #bee3f8;
      border-radius: 999px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .chip:hover {
      background: #bee3f8;
      border-color: #90cdf4;
    }

    .result-section {
      margin-top: 1.5rem;
    }

    .result-section h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 0.5rem;
    }

    pre {
      background: #1a202c;
      color: #e2e8f0;
      padding: 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 3rem;
    }

    pre.error {
      background: #fff5f5;
      color: #c53030;
      border: 1px solid #fed7d7;
    }

    .spinner {
      display: inline-block;
      width: 1rem;
      height: 1rem;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.3rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>Cost Analyzer Helpdesk</h1>
    <p>Get monthly EC2 cost estimates powered by the MCP pricing server.</p>
  </header>

  <div class="card">
    <label for="instance_type">instance type, e.g. m5.large</label>
    <div class="input-row">
      <input type="text" id="instance_type" placeholder="instance type, e.g. m5.large" />
      <button class="estimate-btn" id="estimateBtn" onclick="runEstimate()">Estimate</button>
    </div>

    <div class="chips">
      <span class="chip" onclick="prefill('m5.large')">m5.large</span>
      <span class="chip" onclick="prefill('t3.micro')">t3.micro</span>
      <span class="chip" onclick="prefill('r5.xlarge')">r5.xlarge</span>
    </div>

    <div class="result-section">
      <h2>Result</h2>
      <pre id="resultBlock">Results will appear here after you click Estimate.</pre>
    </div>
  </div>

  <script>
    const ENDPOINT = "http://127.0.0.1:44023";

    function prefill(value) {
      document.getElementById("instance_type").value = value;
    }

    async function runEstimate() {
      const instanceType = document.getElementById("instance_type").value.trim();
      const btn = document.getElementById("estimateBtn");
      const resultBlock = document.getElementById("resultBlock");

      if (!instanceType) {
        resultBlock.className = "error";
        resultBlock.textContent = "Please enter an instance type before estimating.";
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Loading…';
      resultBlock.className = "";
      resultBlock.textContent = "Calling MCP server…";

      const requestBody = {
        jsonrpc: "2.0",
        id: Date.now(),
        method: "tools/call",
        params: {
          name: "estimate_ec2_monthly_cost",
          arguments: {
            instance_type: instanceType
          }
        }
      };

      try {
        const response = await fetch(ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(requestBody)
        });

        const data = await response.json();

        if (data.error) {
          resultBlock.className = "error";
          resultBlock.textContent = "MCP Error:\n" + JSON.stringify(data.error, null, 2);
        } else {
          resultBlock.className = "";
          resultBlock.textContent = JSON.stringify(data.result, null, 2);
        }
      } catch (err) {
        resultBlock.className = "error";
        resultBlock.textContent = "Network error: " + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = "Estimate";
      }
    }

    document.getElementById("instance_type").addEventListener("keydown", function(e) {
      if (e.key === "Enter") runEstimate();
    });
  </script>
</body>
</html>
